<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Record Payment</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-header bg-info text-white">🧾 Record Patient Payment</div>
      <div class="card-body">
        <form action="save_payment.php" method="POST" class="row g-3">
          <div class="col-md-5">
            <input class="form-control" name="patient_name" placeholder="Patient Name" required />
          </div>
          <div class="col-md-3">
            <input class="form-control" name="amount_paid" placeholder="Amount Paid" type="number" min="0" required />
          </div>
          <div class="col-md-3">
            <input class="form-control" name="payment_date" type="date" required />
          </div>
          <div class="col-md-1">
            <button type="submit" class="btn btn-success w-100">💾</button>
          </div>
        </form>

        <!-- Optional: Navigation or Feedback -->
        <div class="mt-4">
          <a href="view_payments.html" class="btn btn-primary">📄 View Payments</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
