<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Medicines</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container mt-5">
    <h3 class="mb-4 text-primary">🏥 Medicine Inventory</h3>

    <!-- Search Bar -->
    <div class="input-group mb-3">
      <input type="text" class="form-control" placeholder="Search medicine..." />
      <button class="btn btn-outline-secondary">🔍</button>
    </div>

    <!-- Medicine Table -->
    <table class="table table-bordered table-hover" id="medicineTable">
      <thead class="table-info">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Category</th>
          <th>Qty</th>
          <th>Price</th>
          <th colspan="2">Action</th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample Row -->
        <tr>
          <td>1</td>
          <td>Paracetamol</td>
          <td>Painkiller</td>
          <td>120</td>
          <td>200</td>
          <td><button class="btn btn-success btn-sm w-100">✏️ Edit</button></td>
          <td><button class="btn btn-danger btn-sm w-100">🗑️ Delete</button></td>
        </tr>
        <!-- More rows will be injected dynamically -->
      </tbody>
    </table>

    <!-- Navigation -->
    <div class="mt-4">
      <a href="add_new_medicine.html" class="btn btn-primary">➕ Add Medicine</a>
    </div>
  </div>
</body>
</html>
