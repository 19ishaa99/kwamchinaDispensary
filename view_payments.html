<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Payments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container mt-5">
    <h3 class="mb-4 text-primary">📄 Patient Payments</h3>

    <!-- Search Bar -->
    <div class="input-group mb-3">
      <input type="text" class="form-control" placeholder="Search by patient name..." />
      <button class="btn btn-outline-secondary">🔍</button>
    </div>

    <!-- Payments Table -->
    <table class="table table-bordered table-hover">
      <thead class="table-info">
        <tr>
          <th>#</th>
          <th>Patient Name</th>
          <th>Amount Paid</th>
          <th>Date</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <!-- Sample Row -->
        <tr>
          <td>1</td>
          <td>Fatma Ali</td>
          <td>10,000</td>
          <td>2025-08-18</td>
          <td>
            <button class="btn btn-danger btn-sm">🗑️ Delete</button>
          </td>
        </tr>
        <!-- More rows will be injected dynamically -->
      </tbody>
    </table>

    <!-- Total Summary -->
    <div class="mt-3">
      <h5>Total Collected: <span class="text-success">TSh 10,000</span></h5>
    </div>

    <!-- Navigation -->
    <div class="mt-4">
      <a href="payment_form.html" class="btn btn-primary">💳 Record New Payment</a>
    </div>
  </div>
</body>
</html>
