<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Dispensary System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="login_style.css" />
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">

  <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
    <h4 class="text-center text-primary mb-3">🩺 KWAMCHINA DISPENSARY</h4>
    <h4 class="text-center text-primary mb-3">🔐 Login</h4>

    <form id="loginForm" action="index.html" method="post" onsubmit="return validateForm()">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required />
      </div>
      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember" />
        <label class="form-check-label" for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <!-- 🔗 Forgot Password + Register -->
    <div class="mt-3 text-center">
      <a href="forgotPassword.html" class="text-decoration-none">🔑 Forgot Password?</a>
    </div>
    <div class="mt-2 text-center">
      <a href="register.html" class="btn btn-outline-primary w-100">📝 Create New Account</a>
    </div>
  </div>

  <script>
    function validateForm() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (username === "" || password === "") {
        alert("Please fill in both username and password.");
        return false;
      }

      alert("Login successful (demo only)");
      return true;
    }
  </script>
</body>
</html>
