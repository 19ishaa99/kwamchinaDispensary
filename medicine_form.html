<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Medicine</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-header bg-info text-white">💊 Morning Stock Update</div>
      <div class="card-body">
        <form id="medicineForm" action="save_medicine.php" method="POST" class="row g-3">
          <div class="col-md-4">
            <input class="form-control" name="medicine_name" placeholder="Medicine Name" required />
          </div>
          <div class="col-md-3">
            <select class="form-select" name="category" required>
              <option value="">Select Category</option>
              <option value="Antibiotic">Antibiotic</option>
              <option value="Painkiller">Painkiller</option>
              <option value="Supplement">Supplement</option>
            </select>
          </div>
          <div class="col-md-2">
            <input class="form-control" name="quantity" placeholder="Quantity" type="number" min="1" required />
          </div>
          <div class="col-md-2">
            <input class="form-control" name="unit_price" placeholder="Unit Price" type="number" min="0" step="0.01" required />
          </div>
          <div class="col-md-1">
            <button type="submit" class="btn btn-success w-100">➕</button>
          </div>

          <div class="col-md-4">
            <a href="view_medicine.html" class="btn btn-primary w-100">🏥 View Medicines</a>
          </div>
          <div class="col-md-4">
            <a href="add_new_medicine.html" class="btn btn-outline-primary w-100">➕ Add New Medicine Type</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
