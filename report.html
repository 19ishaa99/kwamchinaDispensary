<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generate Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    #reportPreview { display: none; }
    @media print {
      body * {
        visibility: hidden;
      }
      #reportPreview, #reportPreview * {
        visibility: visible;
      }
      #reportPreview {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <section id="reports" class="container mt-5 mb-5">
    <h4 class="mb-4 text-primary">📄 Generate Report</h4>
    <form id="reportForm" class="row g-3">
      <div class="col-md-4">
        <select class="form-select" name="report_type" required>
          <option value="">Select Report Type</option>
          <option value="income_expense">Monthly Income/Expense</option>
          <option value="patient_records">Patient Records</option>
        </select>
      </div>
      <div class="col-md-3">
        <input type="date" name="start_date" class="form-control" required />
      </div>
      <div class="col-md-3">
        <input type="date" name="end_date" class="form-control" required />
      </div>
      <div class="col-md-2">
        <button type="submit" class="btn btn-dark w-100">🖨️ Generate</button>
      </div>
    </form>

    <!-- Report Preview -->
    <div id="reportPreview" class="mt-5">
      <h5 class="text-secondary">Report Preview:</h5>
      <div class="border p-3 bg-light" id="reportContent"></div>
      <button id="printBtn" class="btn btn-outline-primary mt-3">🖨️ Print Report</button>
    </div>
  </section>

  <script>
    document.getElementById("reportForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const type = this.report_type.value;
      const start = this.start_date.value;
      const end = this.end_date.value;
      const preview = document.getElementById("reportPreview");
      const content = document.getElementById("reportContent");

      let reportHTML = `<p><strong>Report Type:</strong> ${type.replace('_', ' ')}</p>`;
      reportHTML += `<p><strong>Date Range:</strong> ${start} to ${end}</p>`;

      if (type === "income_expense") {
        reportHTML += `
          <table class="table table-bordered mt-3">
            <thead><tr><th>Category</th><th>Amount</th></tr></thead>
            <tbody>
              <tr><td>Income</td><td>TZS 1,200,000</td></tr>
              <tr><td>Expenses</td><td>TZS 850,000</td></tr>
              <tr class="table-success"><td><strong>Net</strong></td><td><strong>TZS 350,000</strong></td></tr>
            </tbody>
          </table>`;
      } else if (type === "patient_records") {
        reportHTML += `
          <table class="table table-bordered mt-3">
            <thead><tr><th>Patient Name</th><th>Visit Date</th><th>Service</th></tr></thead>
            <tbody>
              <tr><td>Fatma Juma</td><td>${start}</td><td>Consultation</td></tr>
              <tr><td>Ali Mwinyi</td><td>${end}</td><td>Lab Test</td></tr>
            </tbody>
          </table>`;
      } else {
        reportHTML += `<p class="text-danger">Please select a valid report type.</p>`;
      }

      content.innerHTML = reportHTML;
      preview.style.display = "block";
    });

    document.getElementById("printBtn").addEventListener("click", function() {
      window.print();
    });
  </script>
</body>
</html>
